// ---------- Resizable panel helpers ----------
// dir=+1 for left-edge handle (drag right → grow), dir=-1 for right-edge handle (drag left → grow)
function useDragW(initial,min,max,dir){
  const [w,setW]=useState(initial);
  const st=useRef({x:0,w:0});
  const onMouseDown=useCallback((e)=>{
    st.current.x=e.clientX; st.current.w=w;
    const d=dir||1;
    const mv=(ev)=>{
      const dx=(ev.clientX-st.current.x)*d;
      const nw=Math.min(max,Math.max(min,st.current.w+dx));
      setW(nw);
    };
    const up=()=>{window.removeEventListener("mousemove",mv);window.removeEventListener("mouseup",up);document.body.style.cursor="";document.body.style.userSelect="";};
    window.addEventListener("mousemove",mv);
    window.addEventListener("mouseup",up);
    document.body.style.cursor="col-resize";
    document.body.style.userSelect="none";
    e.preventDefault();
  },[w,min,max,dir]);
  return [w,setW,onMouseDown];
}
function VDragHandle({onMouseDown,title}){
  return h("div",{onMouseDown,title:title||"Spalte anpassen",
    style:{width:6,cursor:"col-resize",background:"var(--sep)",
      borderLeft:"1px solid var(--b)",borderRight:"1px solid var(--b)",

  });
}

// ---------- Demo-Daten-Generator (15-min, 2025 + 2026-Prognose) ----------
let _demoCache=null;
const PROGNOSE_START=new Date(2026,4,1,0,0,0).getTime(); // 1. Mai 2026
function generateDemoData(){
  if(_demoCache) return _demoCache;
  const startMs=new Date(2025,0,1,0,0,0).getTime();
  const endMs=new Date(2027,0,1,0,0,0).getTime(); // bis Ende 2026
  const step=15*60*1000;
  const n=Math.floor((endMs-startMs)/step);
  const data=new Array(n);
  let seed=42;
  const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280};

  for(let i=0;i<n;i++){
    const t=startMs+i*step;
    const d=new Date(t);
    const hr=d.getHours()+d.getMinutes()/60;
    const dow=d.getDay();
    const month=d.getMonth();
    const doy=Math.floor((t-startMs)/86400000);
    const isPrognose=t>=PROGNOSE_START;
    // Prognose: leichte Verbesserung ~3 % gegenüber Vorjahr
    const progFactor=isPrognose?0.97:1.0;

    const isWork=dow>=1&&dow<=5;
    let stromBase=isWork?(180+220*Math.exp(-Math.pow((hr-12)/4,2))):(140+30*Math.exp(-Math.pow((hr-13)/5,2)));
    const sommerKuehl=month>=5&&month<=8?40*Math.exp(-Math.pow((hr-14)/3,2)):0;
    stromBase+=sommerKuehl;
    stromBase*=(0.92+0.16*rnd())*progFactor;
    if(doy===87) stromBase*=1.45;
    if(doy===201) stromBase*=1.32;
    const strom=Math.max(30,stromBase)/4;

    const isHeizP=month<=3||month>=9;
    const tempFaktor=isHeizP?(1.5-0.6*Math.cos(2*Math.PI*(hr-6)/24)):0.15;
    let gasBase=isWork?(250*tempFaktor+80):(120*tempFaktor+40);
    if(doy>=12&&doy<=18) gasBase*=1.35;
    gasBase*=(0.9+0.2*rnd())*progFactor;
    const gas=Math.max(10,gasBase)/4;

    let waermeBase=isWork?(90+40*Math.exp(-Math.pow((hr-10)/5,2))):50;
    waermeBase*=(0.93+0.14*rnd())*progFactor;
    const waerme=Math.max(20,waermeBase)/4;

    data[i]={t,strom,gas,waerme,isPrognose};
  }
  _demoCache=data;
  return data;
}

// Aggregationshelfer
function aggregate(data,res){
  // res: '15min','h','d','w','m'
  if(res==='15min') return data;
  const out=[];let bucket=null;
  const keyFn={
    h:d=>{const x=new Date(d.t);x.setMinutes(0,0,0);return x.getTime()},
    d:d=>{const x=new Date(d.t);x.setHours(0,0,0,0);return x.getTime()},
    w:d=>{const x=new Date(d.t);x.setHours(0,0,0,0);x.setDate(x.getDate()-x.getDay());return x.getTime()},
    m:d=>{const x=new Date(d.t);return new Date(x.getFullYear(),x.getMonth(),1).getTime()}
  }[res];
  let curKey=null;
  for(const row of data){
    const k=keyFn(row);
    if(k!==curKey){
      if(bucket)out.push(bucket);
      bucket={t:k,strom:0,gas:0,waerme:0};
      curKey=k;
    }
    bucket.strom+=row.strom;bucket.gas+=row.gas;bucket.waerme+=row.waerme;
  }
  if(bucket)out.push(bucket);
  return out;
}

// ---------- AI Bot (persistent) ----------
function AiBot(){
  const {stamm,activeTab,recentContext,t,aiPreload,setAiPreload}=useContext(AppCtx);
  const [open,setOpen]=useState(true);
  const [msg,setMsg]=useState("");
  const [log,setLog]=useState([{role:"assistant",text:"Hallo – ich bin dein KI-Energieexperte. Ich kenne deine Stammdaten, Lastgänge, Maßnahmen und den aktiven Tab. Frag mich alles zu ISO 50001, DIN 17463, BAFA-Konformität oder deiner Datenlage."}]);
  const [busy,setBusy]=useState(false);
  const inputRef=useRef(null);
  const scrollRef=useRef(null);

  useEffect(()=>{if(open&&inputRef.current)inputRef.current.focus()},[open]);
  useEffect(()=>{if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight},[log,busy]);

  // aiPreload reacts to "Mit KI-Assistent besprechen"-Buttons aus anderen Tabs
  useEffect(()=>{
    if(aiPreload){
      setOpen(true);
      setMsg(aiPreload);
      setAiPreload(null);
      setTimeout(()=>{ if(inputRef.current){ inputRef.current.focus(); inputRef.current.scrollIntoView({behavior:"smooth",block:"nearest"}); } },50);
      window.scrollTo({top:0,behavior:"smooth"});
    }
  },[aiPreload]);

  async function send(){
    const text=msg.trim();
    if(!text||busy)return;
    setMsg("");
    const newLog=[...log,{role:"user",text}];
    setLog(newLog);setBusy(true);
    try{
      const sys=`Du bist der KI-Energieexperte im GreenMetric ControlCenter für ${FIRMA}. Aktueller Tab: "${activeTab}". Branche: ${stamm.branche}. Standort: ${stamm.standort}. Jahresverbrauch Strom: ${stamm.jahresverbrauchStrom.toLocaleString("de-DE")} kWh, Gas: ${stamm.jahresverbrauchGas.toLocaleString("de-DE")} kWh. Strompreis: ${stamm.strompreis} ct/kWh, Gaspreis: ${stamm.gaspreis} ct/kWh, Diskontsatz: ${stamm.diskontsatz}%. Du kennst ISO 50001 (Kap. 4-10), DIN 17463 (Kapitalwert/IRR/ROI/Amortisation) und das BAFA-Merkblatt (Besondere Ausgleichsregelung, Grüne Konditionalität). Antworte präzise, fachlich, auf Deutsch. Max. 6 Sätze, außer ausdrücklich länger gefordert.${recentContext?" Aktueller Datenkontext: "+recentContext:""}`;
      const resp=await fetch("https://controlcenter.lschneider.workers.dev",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,system:sys,
          messages:newLog.filter(m=>m.role!=="system").map(m=>({role:m.role,content:m.text}))})
      });
      const data=await resp.json();
      const out=(data.content&&data.content[0]&&data.content[0].text)||"[Fehler: "+(data.error&&data.error.message||"Unbekannt")+"]";
      setLog([...newLog,{role:"assistant",text:out}]);
    }catch(e){
      setLog([...newLog,{role:"assistant",text:"[Netzwerkfehler: "+e.message+"]"}]);
    }
    setBusy(false);
  }

  return h("div",{style:{position:"sticky",top:0,zIndex:50,background:"linear-gradient(180deg,var(--s1),var(--bg))",borderBottom:"1px solid var(--b)"}},
    // Header bar always visible
    h("div",{style:{display:"flex",alignItems:"center",padding:"6px 16px",gap:8}},
      h("div",{style:{display:"flex",alignItems:"center",gap:6,cursor:"pointer",whiteSpace:"nowrap"},onClick:()=>setOpen(!open)},
        h("div",{style:{display:"flex",flexDirection:"column"}},
          h("div",{style:{fontSize:16,fontWeight:600,color:"var(--t)",display:"flex",alignItems:"center",gap:6}},
            t("KI-Energieexperte","AI Energy Expert"),h(LiveDot,{color:"var(--g)",size:6})),
          h("div",{style:{fontSize:16,fontFamily:"var(--mono)",color:"var(--faint)"}},busy?t("denkt nach …","thinking …"):t("bereit","ready")+" · "+activeTab)
        )
      ),
      h("input",{ref:inputRef,value:msg,onChange:e=>setMsg(e.target.value),
        onKeyDown:e=>{if(e.key==="Enter")send(); if(e.key==="Escape")setOpen(false);},
        onFocus:()=>setOpen(true),
        placeholder:t("Frag mich etwas über deine Energiedaten …","Ask me about your energy data …"),
        style:{flex:2,maxWidth:700,padding:"7px 12px",fontSize:16,marginLeft:4}}),
      h("button",{className:"btn",onClick:send,disabled:busy,style:{display:"flex",alignItems:"center",gap:6}},
        busy?h("span",{className:"spin",style:{display:"inline-block",width:12,height:12,border:"2px solid var(--g)",borderTopColor:"transparent",borderRadius:12}}):h(Icon,{name:"send",size:12}),
        t("Senden","Send")),
      h("button",{className:"btn",onClick:()=>setOpen(!open)},open?"▲":"▼")
    ),
    // Expanded log
    open&&h("div",{ref:scrollRef,className:"scroll fadein",style:{maxHeight:340,overflowY:"auto",borderTop:"1px solid var(--sep)",padding:"10px 16px",background:"var(--s3)"}},
      log.map((m,i)=>h("div",{key:i,style:{marginBottom:10,display:"flex",gap:8}},
        h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:m.role==="user"?"var(--bl)":"var(--g)",width:40,flexShrink:0,paddingTop:2,textTransform:"uppercase"}},m.role==="user"?"Du":"KI"),
        h("div",{style:{fontSize:16,lineHeight:1.5,color:"var(--t)",whiteSpace:"pre-wrap"}},m.text)
      )),
      busy&&h("div",{style:{fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)"}},"…")
    )

    const hvacProfile=.4+.6*Math.max(0,Math.sin((hr-5)/14*Math.PI));

    const prod=Math.round(60+prodProfile*200+(Math.random()-.5)*18);
    const hvac=Math.round(45+hvacProfile*70+(Math.random()-.5)*10);
    const light=Math.round(18+lightProfile*22+(Math.random()-.5)*5);

    return {t,prod,hvac,light,misc,kw:prod+hvac+light+misc};

// ---------- Sparkline ----------
function Sparkline({color="var(--g)",height=28,vals,withAxis=false,unit=""}){
  if(!R.ResponsiveContainer) return h("div",{style:{height}});
  const data=vals&&vals.length
    ? vals.map((v,i)=>({v:+v.toFixed(0),l:["J","F","M","A","M","J","J","A","S","O","N","D"][i]||""}))
    : Array.from({length:12},(_,i)=>({v:50+30*Math.sin(i/3)+15*Math.sin(i/1.5+1),l:""}));
  const hasLabels=vals&&vals.length;
  const gid="spk"+(color==="var(--g)"?"g":"b");
  return h("div",{style:{height,marginTop:8,overflow:"visible"}},
    h(R.ResponsiveContainer,{width:"100%",height:"100%"},
      h(hasLabels?R.BarChart:R.AreaChart,{data,margin:{top:4,right:4,bottom:4,left:withAxis?0:2},barSize:withAxis?12:10},
        h("defs",null,h("linearGradient",{id:gid,x1:"0",y1:"0",x2:"0",y2:"1"},
          h("stop",{offset:"0",stopColor:color,stopOpacity:.95}),
          h("stop",{offset:"1",stopColor:color,stopOpacity:.35}))),
        hasLabels&&h(R.XAxis,{dataKey:"l",tick:{fontSize:13,fill:"var(--t2)"},axisLine:false,tickLine:false,height:22,tickMargin:4,interval:0,padding:{left:4,right:4}}),
        withAxis&&h(R.YAxis,{tick:{fontSize:11,fill:"var(--faint)"},axisLine:false,tickLine:false,width:42,tickMargin:2,tickCount:4,tickFormatter:(v)=>v>=1000?(v/1000).toFixed(1)+"k":v>=100?Math.round(v):String(v)}),
        withAxis&&h(R.Tooltip,{cursor:{fill:"rgba(255,255,255,.04)"},wrapperStyle:{outline:"none",zIndex:10},
          contentStyle:{background:"var(--s1)",border:"1px solid var(--b)",fontSize:13,borderRadius:4,color:"var(--t)",padding:"4px 8px"},
          itemStyle:{color:"var(--t)",padding:0},labelStyle:{color:"var(--faint)",marginBottom:2},
          formatter:(v)=>[v.toLocaleString("de-DE")+(unit?" "+unit:""),""],
          separator:""}),
        hasLabels
          ? h(R.Bar,{dataKey:"v",fill:"url(#"+gid+")",radius:[2,2,0,0],isAnimationActive:false})
          : h(R.Area,{type:"monotone",dataKey:"v",stroke:color,fill:"url(#"+gid+")",strokeWidth:1.5,dot:false})
      )
    )
  );
}

  const overdue=allDocs.filter(d=>d.status==="ueberfaellig").length;
  const inReview=allDocs.filter(d=>d.status==="in-pruefung").length;

  const visibleDocs=useMemo(()=>{
    const src=q?allDocs.filter(d=>d.name.toLowerCase().includes(q.toLowerCase())||d.summary.toLowerCase().includes(q.toLowerCase())):(DEMO_DOCS[sel]||[]);
    return src;
  },[q,sel,allDocs]);

  const selectedDoc=allDocs.find(d=>d.id===selDoc);

  async function kiSummary(doc){
    setKiBusy(true);setKiOut("");
    try{
      const sys=`Du bist der KI-Energieexperte für ${FIRMA}. Erstelle eine sehr kurze Einschätzung (max. 3 Sätze) zur Bedeutung des Dokuments "${doc.name}" (Kap. ${doc.chapter} der ISO 50001) im Kontext eines Energiemanagementsystems. Ende mit einer konkreten Handlungsempfehlung.`;
      const resp=await fetch("https://controlcenter.lschneider.workers.dev",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,system:sys,
          messages:[{role:"user",content:"Inhaltszusammenfassung: "+doc.summary}]})
      });
      const data=await resp.json();
      const out=(data.content&&data.content[0]&&data.content[0].text)||"[Fehler]";
      setKiOut(out);
      // Append to KI-Aktivitäten-Log
      const now=new Date();
      const tsStr=now.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit",year:"numeric"})+" "+String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
      setKiLog(prev=>[{id:prev.length+1,doc:doc.name,chapter:doc.chapter||sel,action:"KI-Einschätzung erstellt",ts:tsStr,user:"KI-Agent",note:out.slice(0,120)+(out.length>120?"…":"")},
        ...prev]);
    }catch(e){setKiOut("[Netzwerkfehler]")}
    setKiBusy(false);
  }

          h("button",{className:"btn-b"},"Freigeben"),
          h("button",{className:"btn-b"},"Audit-Nachweis")
        )
      ):h("div",{style:{color:"var(--faint)",fontSize:16,textAlign:"center",padding:40}},"Kein Dokument gewählt")
    )
  );
}
// ---------- Lastganganalyse ----------
function Lastganganalyse(){
  const {demoData,stamm,t}=useContext(AppCtx);
  const [traeger,setTraeger]=useState("strom");
  const [res,setRes]=useState("h");
  const [range,setRange]=useState("1m");
  const [viewMode,setViewMode]=useState("gang");
  const [selMonth,setSelMonth]=useState(3);
  const [selYear,setSelYear]=useState(2025);
  const [showPrognose,setShowPrognose]=useState(true);
  const [showAll,setShowAll]=useState(false);
  const [showCost,setShowCost]=useState(false);
  const [showRef,setShowRef]=useState(false);

  const MONAT=["Jan","Feb","M\xe4r","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const TC={strom:"var(--g)",gas:"var(--bl)",waerme:"#60a5fa"};
  const TL={strom:"Strom",gas:"Gas",waerme:"W\xe4rme"};
  const preisFkt={strom:stamm.strompreis/100,gas:stamm.gaspreis/100,waerme:stamm.fernwaermepreis/100};
  const col=TC[traeger];

  // Time window
  const rangeMs={"1w":7,"1m":31,"3m":92,"6m":183,"1j":366}[range]||31;
  const rangeEnd=new Date(selYear,selMonth+1,1).getTime();
  const rangeStart=rangeEnd-rangeMs*86400000;

  // Auto-coarsen resolution for large windows
  const effectiveRes=useMemo(()=>{
    if(res==="15min"&&rangeMs>7) return "h";
    if(res==="h"&&rangeMs>60) return "d";
    return res;
  },[res,rangeMs]);

  // Timestamp label formatter
  const fmtTs=useCallback((t)=>{
    const d=new Date(t);
    const p=n=>String(n).padStart(2,"0");
    const DOW=["So","Mo","Di","Mi","Do","Fr","Sa"];
    if(effectiveRes==="15min") return p(d.getHours())+":"+p(d.getMinutes());
    if(effectiveRes==="h") return p(d.getHours())+":00";
    if(effectiveRes==="d") return DOW[d.getDay()]+" "+p(d.getDate())+"."+p(d.getMonth()+1);
    if(effectiveRes==="m") return MONAT[d.getMonth()];
    return "";
  },[effectiveRes]);

  // Main chart data (Ganglinie / Tagesprofil)
  const chartData=useMemo(()=>{
    const agg=aggregate(demoData,effectiveRes);
    return agg.filter(d=>d.t>=rangeStart&&d.t<rangeEnd).map(d=>{
      const isFc=d.t>=PROGNOSE_START;
      const v={strom:isFc?null:+(d.strom).toFixed(1),gas:isFc?null:+(d.gas).toFixed(1),waerme:isFc?null:+(d.waerme).toFixed(1)};
      return {
        ts:fmtTs(d.t),t:d.t,isFc,
        strom:v.strom, gas:v.gas, waerme:v.waerme,
        stromK:v.strom!==null?+(v.strom*preisFkt.strom).toFixed(2):null,
        gasK:v.gas!==null?+(v.gas*preisFkt.gas).toFixed(2):null,
        waermeK:v.waerme!==null?+(v.waerme*preisFkt.waerme).toFixed(2):null,
        progStrom:+(d.strom*(isFc?1:1.05)+2*Math.sin(d.t/3600000)).toFixed(1)
      };
    });
  },[demoData,effectiveRes,rangeStart,rangeEnd,fmtTs,preisFkt.strom,preisFkt.gas,preisFkt.waerme]);

  // Tagesprofil (24h average)
  const tagesprofil=useMemo(()=>{
    const agg=aggregate(demoData.filter(d=>d.t>=rangeStart&&d.t<rangeEnd&&d.t<PROGNOSE_START),"h");
    const sums=Array(24).fill(0).map(()=>({strom:0,gas:0,waerme:0,n:0}));
    for(const d of agg){const hr=new Date(d.t).getHours();sums[hr].strom+=d.strom;sums[hr].gas+=d.gas;sums[hr].waerme+=d.waerme;sums[hr].n++;}
    return sums.map((s,i)=>({
      h:String(i).padStart(2,"0")+"h",
      strom:s.n?+(s.strom/s.n).toFixed(1):0,
      gas:s.n?+(s.gas/s.n).toFixed(1):0,
      waerme:s.n?+(s.waerme/s.n).toFixed(1):0,
      stromK:s.n?+(s.strom/s.n*preisFkt.strom).toFixed(2):0,
      gasK:s.n?+(s.gas/s.n*preisFkt.gas).toFixed(2):0,
      waermeK:s.n?+(s.waerme/s.n*preisFkt.waerme).toFixed(2):0
    }));
  },[demoData,rangeStart,rangeEnd,preisFkt.strom,preisFkt.gas,preisFkt.waerme]);

  // Stats
  const stats=useMemo(()=>{
    const pts=chartData.filter(d=>!d.isFc);
    const vkey=showCost?traeger+"K":traeger;
    const vs=pts.map(d=>d[vkey]||0);
    if(!vs.length) return {sum:0,max:0,avg:0,deltaYoY:null};
    const sum=vs.reduce((a,b)=>a+b,0);
    const max=Math.max(...vs);
    const avg=sum/vs.length;
    // Year-over-year
    const pStart=rangeStart-365*86400000, pEnd=rangeEnd-365*86400000;
    const pAgg=aggregate(demoData,effectiveRes).filter(d=>d.t>=pStart&&d.t<pEnd&&d.t<PROGNOSE_START);
    const pSum=pAgg.reduce((a,b)=>a+(b[traeger]||0),0);
    const rawSum=pts.map(d=>d[traeger]||0).reduce((a,b)=>a+b,0);
    const deltaYoY=pSum>0?+((rawSum-pSum)/pSum*100).toFixed(1):null;
    return {sum,max,avg,deltaYoY};
  },[chartData,traeger,showCost,demoData,effectiveRes,rangeStart,rangeEnd]);

  // Top peaks table
  const peakData=useMemo(()=>{
    const byH=aggregate(demoData,"h").filter(d=>d.t>=rangeStart&&d.t<rangeEnd&&d.t<PROGNOSE_START);
    if(!byH.length) return [];
    const avg=byH.reduce((a,b)=>a+b[traeger],0)/byH.length;
    const DOW=["So","Mo","Di","Mi","Do","Fr","Sa"];
    return [...byH].sort((a,b)=>b[traeger]-a[traeger]).slice(0,10).map((d,i)=>{
      const dt=new Date(d.t);
      const ts=DOW[dt.getDay()]+" "+dt.toLocaleDateString("de-DE",{day:"2-digit",month:"2-digit"})+" "+String(dt.getHours()).padStart(2,"0")+":00";
      const dev=+((d[traeger]/avg-1)*100).toFixed(1);
      const hr=dt.getHours(); const dow=dt.getDay();
      return {rank:i+1,ts,val:d[traeger].toFixed(0),dev,predicted:dow>=1&&dow<=5&&hr>=9&&hr<17,
              kosten:+(d[traeger]*preisFkt[traeger]).toFixed(2)};
    });
  },[demoData,traeger,rangeStart,rangeEnd,preisFkt]);

    const unit=showCost?"\u20ac":"kWh";
  const bigSum=showCost?stats.sum.toLocaleString("de-DE",{maximumFractionDigits:0})+"\xa0\u20ac":
    (stats.sum>100000?(stats.sum/1000).toFixed(1)+" MWh":Math.round(stats.sum).toLocaleString("de-DE")+" kWh");
  const kostenZr=(chartData.filter(d=>!d.isFc).reduce((a,d)=>a+(d[traeger]||0),0)*preisFkt[traeger]).toLocaleString("de-DE",{maximumFractionDigits:0})+" \u20ac";

  const chData=viewMode==="tages"?tagesprofil:chartData;
  const chKey=viewMode==="tages"?"h":"ts";

  // Build ComposedChart children array
  const ccChildren=[
    h(R.CartesianGrid,{strokeDasharray:"2 4",stroke:"var(--chart-grid)"}),
    h(R.XAxis,{dataKey:chKey,tick:{fontSize:16,fill:"var(--faint)"},axisLine:{stroke:"var(--chart-axis)"},interval:"preserveStartEnd"}),
    h(R.YAxis,{tick:{fontSize:16,fill:"var(--faint)"},axisLine:{stroke:"var(--chart-axis)"},unit:showCost?" \u20ac":" kWh",width:60}),
    h(R.Tooltip,{contentStyle:{background:"var(--chart-tt-bg)",border:"1px solid #243043",fontSize:16,borderRadius:4},
      cursor:{stroke:"var(--bl)",strokeWidth:1,strokeDasharray:"3 3",fill:"transparent"},
      formatter:(v,n)=>[v!=null?v+(showCost?" \u20ac":" kWh"):"Prognose",n]}),
    h(R.Legend,{wrapperStyle:{fontSize:16,color:"var(--t2)"}}),
    h("defs",null,...["strom","gas","waerme"].map(k=>
      h("linearGradient",{key:k,id:"fill_"+k,x1:"0",y1:"0",x2:"0",y2:"1"},
        h("stop",{offset:"5%",stopColor:TC[k],stopOpacity:.5}),
        h("stop",{offset:"95%",stopColor:TC[k],stopOpacity:0}))))
  ];
  if(!showAll){
    ccChildren.push(
      h(R.Area,{type:"monotone",dataKey:showCost?traeger+"K":traeger,name:TL[traeger]+(showCost?" (\u20ac)":""),
        stroke:col,fill:"url(#fill_"+traeger+")",strokeWidth:1.5,dot:false,connectNulls:false})
    );
  } else {
    ["strom","gas","waerme"].forEach(k=>ccChildren.push(
      h(R.Area,{key:k,type:"monotone",dataKey:showCost?k+"K":k,name:TL[k]+(showCost?" (\u20ac)":""),
        stroke:TC[k],fill:"url(#fill_"+k+")",strokeWidth:1.5,dot:false,fillOpacity:.25,connectNulls:false})
    ));
  }
  if(viewMode==="gang"&&showPrognose&&!showAll)
    ccChildren.push(h(R.Line,{type:"monotone",dataKey:"progStrom",name:"Prognose",
      stroke:"var(--bl)",strokeWidth:1.5,strokeDasharray:"5 3",dot:false,opacity:.7}));
  if(showRef&&viewMode==="gang")
    ccChildren.push(h(R.ReferenceLine,{y:stats.avg,stroke:"var(--bl)",strokeDasharray:"3 3",opacity:.8,
      label:{value:"\xd8\xa0"+stats.avg.toFixed(0)+" kWh",fill:"var(--bl)",fontSize:16,position:"insideTopRight"}}));

  return h("div",{style:{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}},
    // Header
    h("div",{style:{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}},
      h("div",null,
        h("div",{style:{fontSize:18,fontWeight:700}},t("Lastganganalyse","Load Profile Analysis")),
        h("div",{style:{fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)",marginTop:2}},
          effectiveRes+"\xa0\xb7\xa0",demoData.length.toLocaleString("de-DE")," Messpunkte\xa0\xb7\xa0Strom + Gas + W\xe4rme\xa0\xb7\xa0ISO 50001 Kap.\xa06.3")),
      h("div",{style:{display:"flex",gap:6}},
        h("button",{className:"btn"},"\u2193 Export CSV"),
        h("button",{className:"btn-b"},"Bericht"))
    ),

    // Stats strip (5 KPIs)
    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}},
      [
        {l:"Summe Zeitraum",v:bigSum,c:col},
        {l:"Mittelwert",v:stats.avg.toFixed(1)+" "+unit,c:"var(--t2)"},
        {l:"Maximum",v:stats.max.toFixed(1)+" "+unit,c:"var(--bl)"},
        {l:"Kosten Zeitraum",v:kostenZr,c:"var(--t2)"},
        {l:"\u0394 vs. Vorjahr",v:stats.deltaYoY!=null?(stats.deltaYoY>=0?"+":"")+stats.deltaYoY+" %":"\u2013",
          c:stats.deltaYoY!=null&&stats.deltaYoY<=0?"var(--g)":"var(--bl)"}
      ].map((k,i)=>h("div",{key:i,className:"tile",style:{padding:"10px 14px"}},
        h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em"}},k.l),
        h("div",{style:{fontSize:16,fontWeight:700,color:k.c,marginTop:4,fontFamily:"var(--mono)"}},k.v)))
    ),

    // Controls row 1: Carrier | Resolution | Range | Period
    h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}},
      h("div",{style:{display:"flex",gap:4}},
        ["strom","gas","waerme"].map(t=>h("button",{key:t,className:"btn"+(traeger===t?" active":""),
          style:{borderColor:traeger===t?TC[t]:"var(--b)",color:traeger===t?TC[t]:"var(--t2)"},
          onClick:()=>setTraeger(t)},
          {strom:"\u26a1 Strom",gas:"\uD83D\uDD25 Gas",waerme:"\u2668 W\xe4rme"}[t]))),
      h("div",{style:{width:1,height:20,background:"var(--b)",margin:"0 4px"}}),
      h("div",{style:{display:"flex",gap:3}},
        [["15min","15min"],["h","1h"],["d","1d"],["m","1mo"]].map(([v,l])=>
          h("button",{key:v,className:"btn"+(res===v?" active":""),
            title:{"15min":"Viertelstunde","h":"Stunde","d":"Tag","m":"Monat"}[v],
            onClick:()=>setRes(v)},l))),
      h("div",{style:{width:1,height:20,background:"var(--b)",margin:"0 4px"}}),
      h("div",{style:{display:"flex",gap:3}},
        [["1w","1W"],["1m","1M"],["3m","3M"],["6m","6M"],["1j","1J"]].map(([v,l])=>
          h("button",{key:v,className:"btn"+(range===v?" active":""),onClick:()=>setRange(v)},l))),
      h("div",{style:{width:1,height:20,background:"var(--b)",margin:"0 4px"}}),
      h("select",{value:selYear,onChange:e=>setSelYear(+e.target.value),style:{width:76}},
        h("option",{value:2025},"2025"),h("option",{value:2026},"2026")),
      h("select",{value:selMonth,onChange:e=>setSelMonth(+e.target.value),style:{width:68}},
        MONAT.map((m,i)=>h("option",{key:i,value:i},m))),
      effectiveRes!==res&&h("span",{className:"chip b",style:{marginLeft:4}},"\u2192 "+effectiveRes+" (auto)")
    ),

    // Controls row 2: View mode | Options
    h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}},
      h("div",{style:{display:"flex",gap:4}},
        [{id:"gang",l:"Ganglinie"},{id:"tages",l:"Tagesprofil"}].map(v=>
          h("button",{key:v.id,className:"btn"+(viewMode===v.id?" active":""),onClick:()=>setViewMode(v.id)},v.l))),
      h("div",{style:{width:1,height:20,background:"var(--b)",margin:"0 4px"}}),
      h("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:16,color:"var(--t2)",cursor:"pointer"}},
        h("input",{type:"checkbox",checked:showAll,onChange:e=>setShowAll(e.target.checked)}),
        "Alle Tr\xe4ger"),
      h("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:16,color:"var(--t2)",cursor:"pointer"}},
        h("input",{type:"checkbox",checked:showCost,onChange:e=>setShowCost(e.target.checked)}),
        "Kosten (\u20ac)"),
      h("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:16,color:"var(--t2)",cursor:"pointer"}},
        h("input",{type:"checkbox",checked:showRef,onChange:e=>setShowRef(e.target.checked)}),
        "\xd8-Referenz"),
      viewMode==="gang"&&h("label",{style:{display:"flex",alignItems:"center",gap:5,fontSize:16,color:"var(--t2)",cursor:"pointer"}},
        h("input",{type:"checkbox",checked:showPrognose,onChange:e=>setShowPrognose(e.target.checked)}),
        "Prognose")
    ),

    // Main chart
    h("div",{className:"tile",style:{padding:14,overflow:"visible"}},
      R.ResponsiveContainer&&h("div",{style:{height:320,overflow:"visible"}},
        h(R.ResponsiveContainer,{width:"100%",height:"100%"},
          h(R.ComposedChart,{data:chData,margin:{top:4,right:8,bottom:0,left:0}},...ccChildren)
        )
      )
    ),

    // Top-10 Lastspitzen (only for gang view)
    viewMode==="gang"&&peakData.length>0&&h("div",{className:"tile",style:{padding:14}},
      h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
        h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em"}},
          "Top-10 Lastspitzen \xb7 "+TL[traeger]+" \xb7 "+MONAT[selMonth]+" "+selYear),
        h("div",{style:{fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)"}},"Mo\u2013Fr 09\u201317h = Regelzeitfenster")
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"28px 1fr 80px 70px 80px 90px",
        padding:"5px 10px",borderBottom:"1px solid var(--b)",fontFamily:"var(--mono)",fontSize:16,
        color:"var(--faint)",textTransform:"uppercase",letterSpacing:".08em"}},
        h("span",null,"#"),h("span",null,"Zeitstempel"),h("span",null,"kWh"),h("span",null,"\u0394 \xd8"),
        h("span",null,"Kosten"),h("span",null,"Einordnung")),
      peakData.map((r,i)=>h("div",{key:i,style:{display:"grid",gridTemplateColumns:"28px 1fr 80px 70px 80px 90px",
        padding:"7px 10px",borderBottom:"1px solid var(--sep)",alignItems:"center",
        background:i===0?"rgba(59,130,246,.04)":"transparent"}},
        h("span",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",fontWeight:i===0?700:400}},r.rank),
        h("span",{style:{fontFamily:"var(--mono)",fontSize:16,color:i===0?"var(--t)":"var(--t2)"}},r.ts),
        h("span",{style:{fontFamily:"var(--mono)",fontSize:16,color:col,fontWeight:600}},r.val),
        h("span",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--bl)"}},"+"+r.dev+"%"),
        h("span",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--t2)"}},r.kosten.toLocaleString("de-DE",{maximumFractionDigits:2})+"\xa0\u20ac"),
        h("span",{style:{fontSize:16}},r.predicted
          ?h("span",{className:"chip g",style:{fontSize:16}},"\u2713 Regelzeit")
          :h("span",{className:"chip b",style:{fontSize:16}},"Ausrei\xdfer"))
      ))
    )
  );
}

// ---------- Kennzahlen (EnPI-Matrix) ----------
function Kennzahlen(){
  const {stamm,t}=useContext(AppCtx);
  const [selTraeger,setSelTraeger]=useState("strom");
  const [selKPI,setSelKPI]=useState("prod");
  const [matSortKey,setMatSortKey]=useState("label");
  const [matSortDir,setMatSortDir]=useState(1);
  const [avgPeriod,setAvgPeriod]=useState("jahr"); // jahr|quartal|monat
  const [drillOpen,setDrillOpen]=useState(null); // null | 'ist' | 'soll'

  // Demo EnPI-Daten: Ist vs Soll, monatlich 2025
  const MONAT=["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];
  const enpiData=useMemo(()=>{
    let seed=77;
    const rnd=()=>{seed=(seed*9301+49297)%233280;return seed/233280};
    return MONAT.map((m,i)=>({
      m,
      "strom-prod":+(210+20*Math.sin(i/3)+5*(rnd()-0.5)*8).toFixed(1),
      "strom-fl":+(28+3*Math.sin(i/3)+rnd()*4).toFixed(1),
      "strom-ma":+(17.5+2*Math.sin(i/3)+rnd()*3).toFixed(1),
      "gas-prod":+(340+50*Math.cos(i/2)+rnd()*20).toFixed(1),
      "gas-fl":+(45+12*Math.cos(i/2)+rnd()*6).toFixed(1),
      "gas-ma":+(28+8*Math.cos(i/2)+rnd()*5).toFixed(1),
      "waerme-prod":+(85+15*Math.cos(i/2)+rnd()*8).toFixed(1),
      "waerme-fl":+(11.5+3*Math.cos(i/2)+rnd()*2).toFixed(1),
      "waerme-ma":+(7.2+2*Math.cos(i/2)+rnd()*1.5).toFixed(1),
    }));
  },[]);

  // Soll-Werte (Baseline − 3 % p.a.)
  const INITIAL_SOLL={"strom-prod":200,"strom-fl":27.0,"strom-ma":17.0,"gas-prod":360,"gas-fl":48,"gas-ma":30,"waerme-prod":82,"waerme-fl":11.0,"waerme-ma":7.0};
  const [SOLL,setSOLL]=useState(INITIAL_SOLL);
  const [editSoll,setEditSoll]=useState(false);
  const [selRow,setSelRow]=useState(null);

  const KPI_DEF=[
    {id:"prod",label:"kWh / t Produktion",unit:"kWh/t"},
    {id:"fl",label:"kWh / m² Fläche",unit:"kWh/m²"},
    {id:"ma",label:"kWh / Mitarbeiter",unit:"kWh/MA"}
  ];
  const TRAEGER=[{id:"strom",l:"Strom",c:"var(--g)"},{id:"gas",l:"Gas",c:"var(--bl)"},{id:"waerme",l:"Wärme",c:"#60a5fa"}];

  const key=`${selTraeger}-${selKPI}`;
  const soll=SOLL[key];
  const latest=enpiData[enpiData.length-1][key];
  const diff=((latest/soll-1)*100);
  const kpiDef=KPI_DEF.find(k=>k.id===selKPI);
  const col=TRAEGER.find(t=>t.id===selTraeger)?.c||"var(--g)";

  // Durchschnitt je Periode
  const periodSlice=avgPeriod==="monat"?enpiData.slice(-1):avgPeriod==="quartal"?enpiData.slice(-3):enpiData;
  const avg=periodSlice.reduce((a,b)=>a+b[key],0)/periodSlice.length;
  const periodLbl=avgPeriod==="monat"?t("Monat","Month"):avgPeriod==="quartal"?t("Quartal","Quarter"):t("Jahr 2025","Year 2025");

  return h("div",{style:{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}},
    h("div",{style:{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}},
      h("div",null,
        h("div",{style:{fontSize:18,fontWeight:700}},t("Kennzahlen","KPIs")),
        h("div",{style:{fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)",marginTop:2}},t("EnPI-Matrix · ISO 50001 Kap. 6.4 · Soll-Ist-Vergleich","EnPI matrix · ISO 50001 Sec. 6.4 · Target vs Actual"))),
      h("div",{style:{display:"flex",gap:6}},
        h("button",{className:"btn"},"↓ Export"),h("button",{className:"btn-b"},"In Report"))
    ),

    // Picker
    h("div",{style:{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}},
      h("div",{style:{display:"flex",gap:4}},
        TRAEGER.map(t=>h("button",{key:t.id,className:"btn"+(selTraeger===t.id?" active":""),onClick:()=>setSelTraeger(t.id)},t.l))),
      h("div",{style:{width:1,height:20,background:"var(--b)"}}),
      h("div",{style:{display:"flex",gap:4}},
        KPI_DEF.map(k=>h("button",{key:k.id,className:"btn"+(selKPI===k.id?" active":""),onClick:()=>setSelKPI(k.id)},k.label))),
      h("div",{style:{width:1,height:20,background:"var(--b)"}}),
      h("span",{style:{fontFamily:"var(--mono)",fontSize:14,color:"var(--t2)",textTransform:"uppercase",letterSpacing:".08em"}},t("Ø-Periode","Avg window")),
      h("div",{style:{display:"flex",gap:4}},
        [{id:"jahr",l:t("Jahr","Year")},{id:"quartal",l:t("Quartal","Quarter")},{id:"monat",l:t("Monat","Month")}].map(p=>
          h("button",{key:p.id,className:"btn"+(avgPeriod===p.id?" active":""),onClick:()=>setAvgPeriod(p.id)},p.l)))
    ),

        h("div",{style:{overflowX:"auto"}},
          h("div",{style:{display:"grid",gridTemplateColumns:gridCols,minWidth:980}},
            // ─── HEADER ROW 1: Gruppen-Header (KPI-Name über IST/SOLL/Diff) ───
            h("div",{onClick:()=>toggle("label"),style:{...thStyle,gridRow:"1 / span 2",display:"flex",alignItems:"center"}},"Energieträger"+arrow("label")),
            ...KPI_DEF.flatMap((k,gi)=>[
              h("div",{key:"grp_"+k.id,style:{...thStyle,gridColumn:"span 3",textAlign:"center",fontWeight:600,color:"var(--t)",borderLeft:gi>0?GROUP_BORDER:"none",borderBottom:"1px solid var(--sep)"}},k.label)
            ]),
            // ─── HEADER ROW 2: IST | SOLL | Δ Sub-Header ───
            ...KPI_DEF.flatMap((k,gi)=>[

                h("div",{key:"l"+r.id,onClick:()=>setSelRow(isSel?null:r.id),
                  style:{padding:"14px 12px",borderBottom:bb,display:"flex",alignItems:"center",gap:8,cursor:"pointer",background:rowBg,borderLeft:"3px solid "+(isSel?r.color:"transparent")}},
                  h("div",{style:{width:10,height:10,borderRadius:10,background:r.color,flexShrink:0,boxShadow:"0 0 0 2px rgba(16,185,129,.12)"}}),
                  h("span",{style:{fontSize:16,fontWeight:600,color:"var(--t)"}},r.label))
              ];
              KPI_DEF.forEach((k,gi)=>{
                const a=r["ist_"+k.id], s=r["soll_"+k.id], d=r["dev_"+k.id];
                const devC=d<=0?"var(--g)":"var(--bl)";
                const base={padding:"14px 10px",borderBottom:bb,textAlign:"right",fontFamily:"var(--mono)",cursor:"pointer",background:rowBg};
                cells.push(h("div",{key:"i"+r.id+k.id,onClick:()=>setSelRow(isSel?null:r.id),style:{...base,borderLeft:gi>0?GROUP_BORDER:"none",color:r.color,fontSize:17,fontWeight:600}},a.toFixed(1)));
                cells.push(h("div",{key:"s"+r.id+k.id,onClick:()=>setSelRow(isSel?null:r.id),style:{...base,color:"var(--t2)",fontSize:16}},s.toFixed(1)));
                cells.push(h("div",{key:"d"+r.id+k.id,onClick:()=>setSelRow(isSel?null:r.id),style:{...base,color:devC,fontSize:15,fontWeight:600}},(d<=0?"▼ ":"▲ ")+Math.abs(d).toFixed(1)+" %"));
              });
              return cells;
            })
          )
        ),
        // ─── DETAIL-AUFRISS (ausgewählte Zeile) ───
        selRow&&(()=>{
          const r=sorted.find(x=>x.id===selRow);
          if(!r) return null;
          return h("div",{className:"fadein",style:{marginTop:12,padding:14,background:"var(--s3)",borderRadius:4,border:"1px solid "+r.color+"40"}},
            h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}},
              h("div",{style:{display:"flex",alignItems:"center",gap:8}},

            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}},
              KPI_DEF.map(k=>{
                const a=r["ist_"+k.id], s=r["soll_"+k.id], d=r["dev_"+k.id];

                return h("div",{key:k.id,style:{padding:10,background:"var(--s1)",borderRadius:4,border:"1px solid var(--sep)"}},
                  h("div",{style:{fontFamily:"var(--mono)",fontSize:13,color:"var(--t2)",textTransform:"uppercase",letterSpacing:".08em",marginBottom:6}},k.label),

                    h("div",null,h("div",{style:{fontSize:13,color:"var(--faint)",fontFamily:"var(--mono)"}},"IST"),h("div",{style:{fontSize:18,fontFamily:"var(--mono)",color:r.color,fontWeight:700}},a.toFixed(1))),

              h("button",{className:"btn",onClick:()=>setSelTraeger(r.id),style:{fontSize:13}},"→ "+t("Als aktiven Träger setzen","Set as active carrier")),
              h("button",{className:"btn",onClick:()=>setEditSoll(true),style:{fontSize:13}},"⚙ "+t("Soll anpassen","Edit target"))));
        })()
      );
    })()
  );
}

function Kernverbraucher(){
  const {demoData,stamm,setTab,t}=useContext(AppCtx);
  // Demo: SEU-Liste (Signifikante Energieeinsätze ISO 50001 Kap. 6.3)
  const seu=[
    {id:"s1",name:"Druckluft Kompressor 1+2",traeger:"strom",pct:24.2,kwh:1016000,trend:+1.2,ort:"Halle A",betr:"Instandhaltung",typ:"Prozess",basis:"SEU nach Kap. 6.3",note:"Leckagerate >8 % – Maßnahme m3 geplant",massId:"m3"},
    {id:"s2",name:"Prozesswärme Ofen 1-4",traeger:"gas",pct:31.1,kwh:2115000,trend:-2.4,ort:"Halle B",betr:"Produktion",typ:"Prozess",basis:"SEU nach Kap. 6.3",note:"Nachtabsenkung m1 aktiv, weitere Optimierung möglich",massId:"m1"},
    {id:"s3",name:"HVAC Gesamtgebäude",traeger:"gas",pct:18.0,kwh:1224000,trend:-5.1,ort:"Alle",betr:"Haustechnik",typ:"Gebäude",basis:"SEU nach Kap. 6.3",note:"Nachtabsenkung und Zeitplan optimiert",massId:"m1"},
    {id:"s4",name:"Beleuchtung Hallen A-C",traeger:"strom",pct:9.1,kwh:382000,trend:-8.3,ort:"Hallen A-C",betr:"Instandhaltung",typ:"Gebäude",basis:"SEU nach Kap. 6.3",note:"LED-Umrüstung Halle C läuft (m2)",massId:"m2"},
    {id:"s5",name:"Pumpen Kühlkreislauf",traeger:"strom",pct:7.4,kwh:311000,trend:+0.4,ort:"Technikraum",betr:"Instandhaltung",typ:"Prozess",basis:"SEU nach Kap. 6.3",note:"Drehzahlregelung prüfen"},
    {id:"s6",name:"Gebäudeheizung Verwaltung",traeger:"fernwaerme",pct:5.2,kwh:354000,trend:-1.1,ort:"Verwaltung",betr:"Haustechnik",typ:"Gebäude",basis:"Sonstig",note:"Außerhalb SEU-Schwelle, zur Vollständigkeit"},
    {id:"s7",name:"IT-Infrastruktur / Server",traeger:"strom",pct:5.0,kwh:210000,trend:+3.8,ort:"Rechenzentrum",betr:"IT",typ:"Infrastruktur",basis:"Sonstig",note:"Virtualisierungsgrad erhöhen"}
  ];

  const [selId,setSelId]=useState("s1");
  const [sortKey,setSortKey]=useState("pct");
  const [sortDir,setSortDir]=useState(-1);
  const sel=seu.find(s=>s.id===selId);

  function toggleSort(key){
    if(sortKey===key) setSortDir(d=>-d);
    else{setSortKey(key);setSortDir(-1);}
  }

  const sortedSeu=useMemo(()=>[...seu].sort((a,b)=>{
    const av=a[sortKey],bv=b[sortKey];
    if(typeof av==="number") return sortDir*(av-bv);
    return sortDir*String(av).localeCompare(String(bv));
  }),[sortKey,sortDir]);

  const [showPrev,setShowPrev]=useState(false);

  // Pareto always by pct desc
  const paretoBase=[...seu].sort((a,b)=>b.pct-a.pct);
  let cum=0;
  // trend is YoY %: prev year = current / (1 + trend/100)
  const paretoData=paretoBase.map(s=>{
    cum+=s.pct;
    const prev=+(s.pct/(1+(s.trend||0)/100)).toFixed(2);
    return {name:s.name.substring(0,16),betr:s.betr,pct:s.pct,pctPrev:prev,cum:+cum.toFixed(1)};
  });

  const TC={strom:"var(--g)",gas:"var(--bl)",fernwaerme:"var(--bl)"};

  function SortTh({label,skey}){
    const active=sortKey===skey;
    return h("span",{onClick:()=>toggleSort(skey),
      style:{cursor:"pointer",userSelect:"none",color:active?"var(--t)":"var(--faint)",display:"inline-flex",alignItems:"center",gap:3}},
      label,h("span",{style:{fontSize:10,opacity:active?1:.4}},active?(sortDir>0?"▲":"▼"):"⇅"));
  }

  const [rightW,,onDragRight]=useDragW(380,280,640,-1);
  return h("div",{style:{display:"grid",gridTemplateColumns:"minmax(0,1fr) 6px "+rightW+"px",gap:0,minHeight:"calc(100vh - 160px)"}},
    h("div",{className:"scroll",style:{overflowY:"auto",padding:"16px 20px"}},
      h("div",{style:{display:"flex",alignItems:"flex-end",justifyContent:"space-between",marginBottom:14}},
        h("div",null,
          h("div",{style:{fontSize:18,fontWeight:700}},t("Kernverbraucher","Top Consumers")),
          h("div",{style:{fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)",marginTop:2}},t("Signifikante Energieeinsätze (SEU) · ISO 50001 Kap. 6.3 · Pareto-Analyse","Significant Energy Uses (SEU) · ISO 50001 Sec. 6.3 · Pareto analysis"))),
        h("div",{style:{display:"flex",gap:6}},h("button",{className:"btn"},"+ SEU hinzufügen"),h("button",{className:"btn-b"},"Bericht"))
      ),

      // Pareto Chart – metallic look
      h("div",{className:"tile",style:{padding:14,marginBottom:14,
        background:"linear-gradient(160deg,#0f1d2e 0%,#111e2d 60%,#0a1420 100%)",
        boxShadow:"inset 0 1px 0 rgba(255,255,255,.04),inset 0 -1px 0 rgba(0,0,0,.3)"}},
        h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,gap:10,flexWrap:"wrap"}},
          h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em"}},t("Pareto-Analyse Energieeinsätze","Pareto analysis of energy uses")),
          h("label",{style:{display:"inline-flex",alignItems:"center",gap:6,cursor:"pointer",fontSize:15,color:"var(--t2)",userSelect:"none"}},
            h("input",{type:"checkbox",checked:showPrev,onChange:e=>setShowPrev(e.target.checked),style:{accentColor:"var(--g)",width:14,height:14}}),
            t("Vorjahr einblenden","show previous year"))
        ),
        R.ResponsiveContainer&&h("div",{style:{height:240}},
          h(R.ResponsiveContainer,{width:"100%",height:"100%"},
            h(R.ComposedChart,{data:paretoData,margin:{top:4,right:8,bottom:4,left:0}},
              h("defs",null,
                h("linearGradient",{id:"barMetal",x1:"0",y1:"0",x2:"0",y2:"1"},
                  h("stop",{offset:"0%",stopColor:"#4ade80",stopOpacity:1}),
                  h("stop",{offset:"35%",stopColor:"#10b981",stopOpacity:1}),
                  h("stop",{offset:"100%",stopColor:"#064e30",stopOpacity:1})
                ),
                h("linearGradient",{id:"barMetalSel",x1:"0",y1:"0",x2:"0",y2:"1"},
                  h("stop",{offset:"0%",stopColor:"#6ee7b7",stopOpacity:1}),
                  h("stop",{offset:"35%",stopColor:"#34d399",stopOpacity:1}),
                  h("stop",{offset:"100%",stopColor:"#065f46",stopOpacity:1})
                )
              ),
              h(R.CartesianGrid,{strokeDasharray:"2 4",stroke:"var(--chart-grid)"}),
              h(R.XAxis,{dataKey:"name",interval:0,height:46,tick:(p)=>{

// Kapitalwert (NPV) bei jährlich konstantem Cashflow
function npv(invest,cashflowYear,lifeYears,discountPct){
  const r=discountPct/100;
  let pv=0;
  for(let t=1;t<=lifeYears;t++) pv+=cashflowYear/Math.pow(1+r,t);
  return pv-invest;
}
// IRR (Newton-Approx) – sucht r, bei dem NPV=0
function irr(invest,cashflowYear,lifeYears){
  let r=0.1;
  for(let i=0;i<60;i++){
    let f=-invest,df=0;
    for(let t=1;t<=lifeYears;t++){
      const d=Math.pow(1+r,t);
      f+=cashflowYear/d;
      df+=-t*cashflowYear/(d*(1+r));
    }
    if(Math.abs(df)<1e-9)break;
    const nr=r-f/df;
    if(!isFinite(nr)||nr<-0.99){r=-0.5;break;}
    if(Math.abs(nr-r)<1e-6){r=nr;break;}
    r=nr;
  }
  return r*100;
}
// ROI (statisch, ges. Laufzeit)
function roi(invest,cashflowYear,lifeYears){
  return ((cashflowYear*lifeYears-invest)/invest)*100;
}
// Amortisationsdauer (statisch)
function payback(invest,cashflowYear){
  return cashflowYear>0?invest/cashflowYear:Infinity;
}

        h("div",{style:{display:"flex",gap:6,marginTop:8,flexWrap:"wrap"}},
          massStatusChip(sel.status),
          h("span",{className:"chip"},sel.traeger.toUpperCase()),
          h("span",{className:"chip"},"Laufzeit ",sel.life," a"),
          h("span",{className:"chip"},"Prio: ",sel.prio)
        ),

        // Szenario-Schalter
        h("div",{style:{marginTop:14,padding:10,background:"var(--s3)",border:"1px solid var(--b)",borderRadius:4}},
          h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}},"Szenario-Analyse ±25 %"),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}},
            [{id:"worst",l:"Worst −25 %",c:"var(--faint)"},{id:"real",l:"Realistic",c:"var(--bl)"},{id:"best",l:"Best +25 %",c:"var(--g)"}].map(s=>
              h("button",{key:s.id,onClick:()=>setScenario(s.id),

        ),

        // KPI-Kacheln (Ergebnisse)
        h("div",{style:{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}},
          [
            {l:"Kapitalwert",v:fmtEuro(selCalc.npv),c:selCalc.npv>=0?"var(--g)":"var(--bl)",sub:"Barwert Netto"},
            {l:"Interne Verzinsung",v:fmtPct(selCalc.irr),c:selCalc.irr>=stamm.diskontsatz?"var(--g)":"var(--bl)",sub:"IRR · Hurdle "+stamm.diskontsatz+" %"},
            {l:"ROI gesamt",v:fmtPct(selCalc.roi),c:"var(--t)",sub:"über "+sel.life+" Jahre"},
            {l:"Amortisation",v:fmtYears(selCalc.payback),c:selCalc.payback<sel.life?"var(--g)":"var(--bl)",sub:"statisch"}
          ].map((k,i)=>h("div",{key:i,style:{padding:"10px 12px",border:"1px solid var(--b)",borderRadius:4,background:"var(--s3)"}},
            h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em"}},k.l),
            h("div",{style:{fontSize:16,fontWeight:700,color:k.c,marginTop:4,fontFamily:"var(--mono)"}},k.v),
            h("div",{style:{fontSize:16,color:"var(--faint)",marginTop:2}},k.sub)))
        ),

        // 3-Szenarien-Prognose (immer sichtbar)
        (()=>{
          const worstC=calc(sel,false); // = real mit f=1, wir rechnen unten selbst
          const scen=[
            {id:"worst",l:"Worst",sub:"−25 %",f:0.75,c:"var(--faint)"},
            {id:"real",l:"Standard",sub:"Realistic",f:1.0,c:"var(--bl)"},
            {id:"best",l:"Best",sub:"+25 %",f:1.25,c:"var(--g)"}
          ];
          const rows=scen.map(s=>{
            const kwh=sel.kwh*s.f;
            const eur=kwh*priceForTraeger(sel.traeger);
            const np=npv(sel.invest,eur,sel.life,stamm.diskontsatz);
            const pb=payback(sel.invest,eur);
            const co2=sel.co2t*s.f;
            return {...s,kwh,eur,np,pb,co2};
          });
          const maxAbs=Math.max(...rows.map(r=>Math.abs(r.np)))||1;
          return h("div",{style:{marginTop:14,padding:12,border:"1px solid var(--b)",borderRadius:4,background:"var(--s1)"}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em"}},"Prognose · 3 Varianten"),

            h("div",{style:{display:"grid",gridTemplateColumns:"70px 1fr 1fr 80px",gap:8,fontSize:14,fontFamily:"var(--mono)",color:"var(--faint)",textTransform:"uppercase",letterSpacing:".08em",paddingBottom:5,borderBottom:"1px solid var(--sep)"}},
              h("span",null,"Variante"),h("span",null,"Einsp./a"),h("span",null,"Kapitalwert"),h("span",{style:{textAlign:"right"}},"Payback")),
            rows.map((r,i)=>{
              const barW=(Math.abs(r.np)/maxAbs)*100;
              const isActive=scenario===r.id;
              return h("div",{key:r.id,onClick:()=>setScenario(r.id),
                style:{display:"grid",gridTemplateColumns:"70px 1fr 1fr 80px",gap:8,alignItems:"center",padding:"8px 0",
                  borderBottom:i<2?"1px solid var(--sep)":"none",cursor:"pointer",
                  background:isActive?"rgba(16,185,129,.05)":"transparent",marginLeft:isActive?-6:0,marginRight:isActive?-6:0,paddingLeft:isActive?6:0,paddingRight:isActive?6:0,borderLeft:"3px solid "+(isActive?r.c:"transparent"),borderRadius:3}},
                h("div",null,
                  h("div",{style:{fontSize:16,fontWeight:600,color:r.c,fontFamily:"var(--sans)"}},r.l),
                  h("div",{style:{fontSize:13,color:"var(--faint)"}},r.sub)),
                h("div",null,
                  h("div",{style:{fontSize:16,color:"var(--g)",fontWeight:500}},fmtEuro(r.eur)),
                  h("div",{style:{fontSize:13,color:"var(--faint)"}},fmtKWh(r.kwh))),
                h("div",null,
                  h("div",{style:{fontSize:16,color:r.np>=0?"var(--g)":"var(--bl)",fontWeight:500}},fmtEuro(r.np)),
                  h("div",{style:{height:4,marginTop:3,background:"var(--s3)",borderRadius:2,overflow:"hidden"}},
                    h("div",{style:{height:"100%",width:barW+"%",background:r.c,opacity:.7}}))),
                h("span",{style:{fontSize:16,color:"var(--t2)",textAlign:"right"}},fmtYears(r.pb))
              );
            }),
            h("div",{style:{marginTop:6,fontSize:13,color:"var(--faint)",fontFamily:"var(--mono)"}},
              "Klick auf Variante aktiviert Szenario für alle Berechnungen unten.")
          );
        })(),

        // Input-Parameter (editierbar)
        h("div",{style:{marginTop:16}},
          h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:8}},"Parameter"),
          [
            {k:"invest",l:"Investitionssumme",unit:"€"},
            {k:"kwh",l:"Einsparung Energie",unit:"kWh/a"},
            {k:"co2t",l:"CO₂-Einsparung",unit:"t/a"},
            {k:"life",l:"Nutzungsdauer",unit:"a"}
          ].map(f=>h("div",{key:f.k,style:{display:"grid",gridTemplateColumns:"1fr 120px 32px",gap:6,alignItems:"center",marginBottom:6}},
            h("span",{style:{fontSize:16,color:"var(--t2)"}},f.l),
            h("input",{type:"number",value:sel[f.k],onChange:e=>updateField(f.k,parseFloat(e.target.value)||0),style:{textAlign:"right",fontFamily:"var(--mono)",fontSize:16,padding:"4px 8px"}}),
            h("span",{style:{fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)"}},f.unit)
          ))
        ),

        // Wirkungs-Kennzahlen
        h("div",{style:{marginTop:14,padding:12,background:"linear-gradient(180deg,rgba(59,130,246,.06),transparent)",border:"1px solid rgba(59,130,246,.2)",borderRadius:4}},
          h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--bl)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:8}},"Jährliche Wirkung ("+({worst:"Worst",real:"Realistic",best:"Best"}[scenario])+")"),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:16}},
            h("div",null,h("div",{style:{color:"var(--faint)",fontSize:16}},"Energie"),h("div",{style:{fontWeight:600,fontFamily:"var(--mono)",color:"var(--t)"}},fmtKWh(selCalc.kwhYear))),
            h("div",null,h("div",{style:{color:"var(--faint)",fontSize:16}},"Kosten"),h("div",{style:{fontWeight:600,fontFamily:"var(--mono)",color:"var(--g)"}},fmtEuro(selCalc.eurYear))),
            h("div",null,h("div",{style:{color:"var(--faint)",fontSize:16}},"CO₂"),h("div",{style:{fontWeight:600,fontFamily:"var(--mono)",color:"var(--t)"}},selCalc.co2Year.toFixed(1)," t")),
            h("div",null,h("div",{style:{color:"var(--faint)",fontSize:16}},"Einsparrate"),h("div",{style:{fontWeight:600,fontFamily:"var(--mono)",color:"var(--t)"}},((selCalc.kwhYear/(sel.traeger==="strom"?stamm.jahresverbrauchStrom:stamm.jahresverbrauchGas))*100).toFixed(1)," %")))
        ),

        // Stammdaten-Referenz
        h("div",{style:{marginTop:12,fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)",padding:"8px 10px",background:"var(--s3)",borderRadius:3,lineHeight:1.6}},
          "Basis: Strom ",stamm.strompreis," ct · Gas ",stamm.gaspreis," ct · Diskont ",stamm.diskontsatz," % · Standort ",stamm.standort
        ),

        // Status + Aktionen
        h("div",{style:{marginTop:14}},
          h("div",{style:{fontFamily:"var(--mono)",fontSize:16,color:"var(--faint)",textTransform:"uppercase",letterSpacing:".1em",marginBottom:6}},"Status ändern"),
          h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:4}},
            Object.keys(MASS_STATUS).map(s=>h("button",{key:s,onClick:()=>updateField("status",s),
              style:{padding:"6px 4px",fontSize:16,border:"1px solid "+(sel.status===s?"var(--g)":"var(--b)"),borderRadius:3,
                background:sel.status===s?"rgba(16,185,129,.1)":"var(--s2)",color:sel.status===s?"var(--g)":"var(--t2)",cursor:"pointer"}},MASS_STATUS[s].l)))
        ),
        h("div",{style:{marginTop:10,display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}},
          h("button",{className:"btn"},"Auf Förderfähigkeit prüfen"),
          h("button",{className:"btn-b"},"In Bericht übernehmen"),
          h("button",{className:"btn"},"Duplizieren"),
          h("button",{className:"btn",onClick:()=>{setList(list.filter(m=>m.id!==selId));setSelId(list[0]?.id)}},"Entfernen")
        )
      ):h("div",{style:{color:"var(--faint)",fontSize:16,textAlign:"center",padding:40}},"Keine Maßnahme gewählt")
    )
  );
}
// ---------- Reports ----------
function Reports(){
  const {stamm}=useContext(AppCtx);
  const [selType,setSelType]=useState("audit");
  const [genState,setGenState]=useState("idle"); // idle | generating | done
  const [genText,setGenText]=useState("");
  const [selPeriod,setSelPeriod]=useState("2025");
  const [schedules,setSchedules]=useState([
    {id:1,type:"kpi",freq:"monatlich",enabled:true,nextRun:"01.05.2026",lastRun:"01.04.2026"},
    {id:2,type:"audit",freq:"quartalsweise",enabled:true,nextRun:"01.07.2026",lastRun:"01.04.2026"},

  ]);
  const [showAddSched,setShowAddSched]=useState(false);
  const [newSched,setNewSched]=useState({type:"kpi",freq:"monatlich",email:""});
  const [recipients,setRecipients]=useState([
    {id:1,email:"e.wagner@musterfirma.de",name:"E. Wagner · Energiebeauftr.",berichte:["kpi","audit","wirtschaft"]},
    {id:2,email:"controlling@musterfirma.de",name:"R. Müller · Controlling",berichte:["wirtschaft","management"]},
    {id:3,email:"gf@musterfirma.de",name:"Geschäftsführung",berichte:["management","bafa"]}
  ]);
  const [showAddRec,setShowAddRec]=useState(false);
  const [newRec,setNewRec]=useState({email:"",name:"",berichte:[]});

  const REPORT_TYPES=[
    {id:"audit",label:"Auditbericht",icon:"🔍",sub:"ISO 50001 Kap. 9.2 · intern",desc:"Strukturierter interner Auditbericht gemäß ISO 50001 Kap. 9.2 mit Befunden, Abweichungen, Stärken und Korrekturmaßnahmen."},
    {id:"kpi",label:"KPI-Bericht",icon:"📊",sub:"ISO 50001 Kap. 9.1 · EnPI",desc:"Energieleistungsbericht mit allen EnPIs, Soll-Ist-Vergleich, Trend und Bewertung gemäß ISO 50001 Kap. 9.1."},
    {id:"wirtschaft",label:"Wirtschaftlichkeit",icon:"💶",sub:"DIN 17463 · Maßnahmen",desc:"Wirtschaftlichkeitsbewertung aller Maßnahmen nach DIN 17463: Kapitalwert, IRR, ROI, Amortisation und Szenario-Analyse."},
    {id:"management",label:"Managementbewertung",icon:"🏛",sub:"ISO 50001 Kap. 9.3",desc:"Vorlage zur Managementbewertung mit allen 8 Input-Kategorien und Output-Entscheidungen nach Kap. 9.3."},
    {id:"bafa",label:"BAFA-Nachweis",icon:"🏛",sub:"EnFG · Grüne Konditionalität",desc:"Aufstellung der Energieeffizienzmaßnahmen und Investitionskosten für den BAFA-Antrag (Besondere Ausgleichsregelung, Grüne Konditionalität)."}
  ];

  const PROMPTS={
    audit:`Erstelle einen strukturierten internen Auditbericht (Entwurf) für ${FIRMA} gemäß ISO 50001 Kap. 9.2. Berichtszeitraum: ${selPeriod}. Gliederung:\n1. Auditumfang und -ziele\n2. Auditteam und Methodik\n3. Befunde je Kapitel 4–10\n4. Abweichungen und Verbesserungspotenziale\n5. Stärken\n6. Empfehlungen und Korrekturmaßnahmen\n7. Abschluss und Freigabe\nDeutsch, formell, ca. 500 Wörter.`,
    kpi:`Erstelle einen Energieleistungsbericht für ${FIRMA} (${selPeriod}) gemäß ISO 50001 Kap. 9.1. Stammdaten: Strom ${stamm.jahresverbrauchStrom.toLocaleString("de-DE")} kWh, Gas ${stamm.jahresverbrauchGas.toLocaleString("de-DE")} kWh, ${stamm.mitarbeiter} Mitarbeiter, ${stamm.produktion} t/a Produktion, ${stamm.flaeche} m² Fläche. Gliederung: 1. Executive Summary, 2. EnPI-Übersicht (7 Kennzahlen), 3. Zielabgleich, 4. Abweichungsanalyse, 5. Handlungsempfehlungen. Deutsch, ca. 400 Wörter.`,
    wirtschaft:`Erstelle eine Wirtschaftlichkeitszusammenfassung nach DIN 17463 für ${FIRMA} (${selPeriod}). Portfolio: 4 Maßnahmen, Gesamtinvest ~591.800 €, Gesamteinsparung ~263.000 €/a, ~766.000 kWh/a, ~251 t CO₂/a. Gliederung: 1. Portfolioübersicht, 2. Maßnahmen im Detail (NPV, IRR, ROI, Amortisation), 3. Szenario-Analyse Best/Worst, 4. Förderempfehlungen, 5. Priorisierung. Deutsch, ca. 450 Wörter.`,
    management:`Erstelle eine Vorlage für die Managementbewertung ${selPeriod} nach ISO 50001 Kap. 9.3 für ${FIRMA}. Alle 8 Input-Kategorien mit Leitfragen und Musterformulierungen, Output-Entscheidungen. Deutsch, formell.`,
    bafa:`Erstelle eine strukturierte Aufstellung für den BAFA-Nachweis (Besondere Ausgleichsregelung / Grüne Konditionalität) für ${FIRMA}. Inhalt: Energiemanagementsystem ISO 50001 (Nachweis), Energieeffizienzmaßnahmen mit Investitionssummen, Nachweis Mindestinvestition ≥100 % des Begrenzungsbetrags. Deutsch, formell.`
  };

  async function generateReport(){
    setGenState("generating");setGenText("");
    try{
      const resp=await fetch("https://controlcenter.lschneider.workers.dev",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,
          system:"Du bist ein ISO 50001 Experte. Erstelle professionelle Berichte in deutscher Sprache. Verwende Markdown-Formatierung mit # ## ### Überschriften.",
          messages:[{role:"user",content:PROMPTS[selType]}]})
      });
      const data=await resp.json();
      const text=(data.content&&data.content[0]&&data.content[0].text)||"[Fehler: "+(data.error?.message||"Unbekannt")+"]";
      setGenText(text);setGenState("done");
    }catch(e){setGenText("[Netzwerkfehler: "+e.message+"]");setGenState("done");}
  }

  function exportPDF(){
    const {jsPDF}=window.jspdf||{};
    if(!jsPDF){alert("jsPDF nicht geladen");return;}
    const doc=new jsPDF({unit:"mm",format:"a4"});
    const sel=REPORT_TYPES.find(r=>r.id===selType);
    doc.setFontSize(20);doc.setTextColor(10,93,58);
    doc.text("GreenMetric ControlCenter",20,20);
    doc.setFontSize(14);doc.setTextColor(40,40,40);
    doc.text(sel.label+" · "+selPeriod,20,32);
    doc.setFontSize(10);doc.setTextColor(100,100,100);
    doc.text(FIRMA+" · Erstellt: "+new Date().toLocaleDateString("de-DE"),20,40);
    doc.setDrawColor(10,93,58);doc.setLineWidth(0.5);doc.line(20,44,190,44);
    doc.setFontSize(9);doc.setTextColor(60,60,60);
    const lines=doc.splitTextToSize(genText.replace(/#+\s/g,"").replace(/\*\*/g,""),170);
    let y=52;
    for(const line of lines){
      if(y>280){doc.addPage();y=20;}
      if(line.startsWith("# ")){doc.setFontSize(13);doc.setTextColor(10,93,58);}
      else if(line.startsWith("## ")){doc.setFontSize(11);doc.setTextColor(30,58,95);}
      else{doc.setFontSize(9);doc.setTextColor(60,60,60);}
      doc.text(line.replace(/^#+\s/,""),20,y);
      y+=line.startsWith("#")&&!line.startsWith("###")?8:5;
    }
    doc.save((sel.label+"_"+FIRMA+"_"+selPeriod+".pdf").replace(/\s/g,"_"));
  }

  function exportWord(){
    const sel=REPORT_TYPES.find(r=>r.id===selType);
    const content=genText||"(Bericht noch nicht generiert)";
    const html=`<!DOCTYPE html><html><head><meta charset="utf-8">
<style>body{font-family:Calibri,sans-serif;font-size:11pt;margin:2cm}
h1{color:#0a5d3a;font-size:16pt}h2{color:#1e3a5f;font-size:13pt}h3{font-size:11pt}
p{line-height:1.4}table{border-collapse:collapse;width:100%}td,th{border:1px solid #ccc;padding:4px 8px}
</style></head><body>
<h1>${sel.label} · ${FIRMA}</h1>
<p><em>Berichtszeitraum: ${selPeriod} · Erstellt: ${new Date().toLocaleDateString("de-DE")}</em></p>
${content.replace(/^### (.+)$/gm,"<h3>$1</h3>").replace(/^## (.+)$/gm,"<h2>$1</h2>").replace(/^# (.+)$/gm,"<h1>$1</h1>").replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\n\n/g,"</p><p>").replace(/\n/g,"<br>")}
</body></html>`;
    const blob=new Blob([html],{type:"application/vnd.ms-word"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob);
    a.download=(sel.label+"_"+FIRMA+"_"+selPeriod+".doc").replace(/\s/g,"_");
    a.click();
  }

  // Simple markdown renderer
  function renderMd(text){
    if(!text) return null;
    return text.split("\n").map((line,i)=>{
      if(line.startsWith("### ")) return h("div",{key:i,style:{fontSize:16,fontWeight:700,color:"var(--bl)",marginTop:12,marginBottom:4}},line.slice(4));
      if(line.startsWith("## ")) return h("div",{key:i,style:{fontSize:16,fontWeight:700,color:"var(--t)",borderBottom:"1px solid var(--sep)",paddingBottom:4,marginTop:16,marginBottom:6}},line.slice(3));
      if(line.startsWith("# ")) return h("div",{key:i,style:{fontSize:16,fontWeight:700,color:"var(--g)",marginBottom:8}},line.slice(2));
      if(line.startsWith("- ")) return h("div",{key:i,style:{fontSize:16,color:"var(--t2)",paddingLeft:12,lineHeight:1.6}},h("span",{style:{color:"var(--g)",marginRight:6}},"·"),line.slice(2));
      if(line.trim()==="") return h("div",{key:i,style:{height:6}});
      return h("div",{key:i,style:{fontSize:16,color:"var(--t2)",lineHeight:1.6}},line);
    });
  }

  const selDef=REPORT_TYPES.find(r=>r.id===selType);

  return h("div",{style:{padding:"16px 20px",display:"flex",flexDirection:"column",gap:14}},
    h("div",{style:{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}},
      h("div",null,
        h("div",{style:{fontSize:18,fontWeight:700}},"Reports"),
        h("div",{style:{fontSize:16,color:"var(--faint)",fontFamily:"var(--mono)",marginTop:2}},"KI-gestützter Berichtsgenerator · PDF & Word-Export")),
      h("select",{value:selPeriod,onChange:e=>setSelPeriod(e.target.value),style:{fontSize:16}},
        ["2025","2024","2023"].map(y=>h("option",{key:y,value:y},y)))
    ),

    h("div",{style:{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:8}},
      REPORT_TYPES.map(r=>h("div",{key:r.id,className:"tile",onClick:()=>{setSelType(r.id);setGenState("idle");setGenText("");},
        style:{padding:"12px 14px",cursor:"pointer",borderColor:selType===r.id?"var(--g)":"var(--b)",background:selType===r.id?"rgba(16,185,129,.06)":""}},
        h("div",{style:{fontSize:19,marginBottom:6}},r.icon),
        h("div",{style:{fontSize:16,fontWeight:600,color:selType===r.id?"var(--g)":"var(--t)"}},r.label),
        h("div",{style:{fontSize:16,fontFamily:"var(--mono)",color:"var(--faint)",marginTop:3}},r.sub)))
    ),

    h("div",{style:{padding:12,border:"1px solid var(--b)",borderRadius:4,background:"var(--s1)",fontSize:16,color:"var(--t2)"}},
      selDef.desc),

    h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
      h("button",{className:"btn",onClick:generateReport,disabled:genState==="generating",
        style:{display:"flex",alignItems:"center",gap:8,padding:"8px 16px"}},
        genState==="generating"?h("span",{className:"spin",style:{display:"inline-block",width:12,height:12,border:"2px solid var(--g)",borderTopColor:"transparent",borderRadius:12}}):h(Icon,{name:"bot",size:13}),
        genState==="generating"?"KI generiert …":"Mit KI generieren"),
      genState==="done"&&h("button",{className:"btn",onClick:exportPDF,style:{display:"flex",alignItems:"center",gap:6}},h(Icon,{name:"file",size:13}),"PDF exportieren"),
      genState==="done"&&h("button",{className:"btn-b",onClick:exportWord,style:{display:"flex",alignItems:"center",gap:6}},h(Icon,{name:"doc",size:13}),"Word exportieren"),
      genState==="done"&&h("button",{className:"btn",onClick:()=>{setGenState("idle");setGenText("")}},"✕ Verwerfen")
    ),

    genState!=="idle"&&h("div",{className:"tile scroll",style:{padding:20,minHeight:300,maxHeight:520,overflowY:"auto"}},

// ── Ziehbares Layout ────────────────────────────────────
function ResizableLayout({tab,setTab,children}){
  const [width,setWidth]=React.useState(290);
  const [dragging,setDragging]=React.useState(false);
  const drag=React.useRef({x:0,w:0});

  React.useEffect(()=>{
    if(!dragging) return;
    const onMove=e=>{
      const delta=e.clientX-drag.current.x;
      setWidth(Math.max(180,Math.min(540,drag.current.w+delta)));
    };
    const onUp=()=>setDragging(false);
    window.addEventListener('mousemove',onMove);
    window.addEventListener('mouseup',onUp);
    return ()=>{
      window.removeEventListener('mousemove',onMove);
      window.removeEventListener('mouseup',onUp);
    };
  },[dragging]);

  const kids=Array.isArray(children)?children:[children];

  return h("div",{style:{
    display:"grid",
    gridTemplateColumns:width+"px 1fr",
    alignItems:"flex-start",
    minHeight:"calc(100vh - 120px)",
    userSelect:dragging?"none":"auto"
  }},
    // Panel + Handle
    h("div",{style:{position:"relative"}},
      h(AgentPanel,{tab,setTab,panelWidth:width}),
      // Drag-Handle
      h("div",{
        onMouseDown:e=>{
          drag.current={x:e.clientX,w:width};
          setDragging(true);
          e.preventDefault();
        },
        style:{
          position:"absolute",right:-3,top:0,bottom:0,width:6,
          cursor:"col-resize",zIndex:20,
          display:"flex",alignItems:"stretch",justifyContent:"center"
        }
      },
        // Sichtbare Linie
        h("div",{style:{
          width:2,height:"100%",
          background:dragging?"var(--g)":"var(--b)",
          transition:dragging?"none":"background .2s",
          opacity:dragging?1:.5
        }}),
        // Breiten-Tooltip beim Ziehen
        dragging?h("div",{style:{
          position:"absolute",top:80,
          background:"var(--s1)",border:"1px solid var(--b)",
          borderRadius:4,padding:"3px 7px",
          fontSize:12,fontFamily:"var(--mono)",
          color:"var(--g)",whiteSpace:"nowrap",
          transform:"translateX(-50%)",pointerEvents:"none",
          boxShadow:"0 2px 8px rgba(0,0,0,.2)"
        }},width+"px"):null
      )
    ),
    // Inhalt
    h("div",{style:{minWidth:0}},...kids)
  );
}

    lg:h(Lastganganalyse,null),

    kv:h(Kernverbraucher,null),
    mass:h(Massnahmen,null),
    rep:h(Reports,null),
    alrm:h(Alarme,null),
    ki:h(KiInsights,null),
    sup:h(Support,null)
  }[tab];

  return h(AppCtx.Provider,{value:ctxVal},
    h("div",{"data-theme":theme,style:{minHeight:"100vh",background:"var(--bg)",color:"var(--t)"}},
      h(BrandBar,null),
      h("div",{style:{borderTop:"1px solid rgba(16,185,129,.25)",borderBottom:"1px solid rgba(16,185,129,.25)"}},h(AiBot,null)),
      tab==="home"
        ?h("div",{key:"home-wrap"},
            h(TabBar,{tab,setTab}),
            h("div",{className:"fadein"},h(WelcomeHome,{setTab,t,lang})))
        :h(ResizableLayout,{tab,setTab},
            h(TabBar,{tab,setTab}),
            h("div",{className:"fadein",key:tab},
              h("div",{style:{padding:"5px 18px",background:"var(--s1)",
                borderBottom:"1px solid var(--b)",display:"flex",alignItems:"center",gap:8}},
                h("button",{onClick:()=>setTab("home"),style:{background:"none",border:"none",
                  cursor:"pointer",color:"var(--g)",fontFamily:"var(--mono)",fontSize:13,
                  fontWeight:600,padding:"2px 0"}},
                  "← "+t("Heute","Today")),
                h("span",{style:{color:"var(--faint)",fontSize:13}},"/"),
                h("span",{style:{color:"var(--t2)",fontSize:13,fontFamily:"var(--mono)"}},
                  TABS.find(x=>x.id===tab)?.label||tab)
              ),
              tabContent
            )
          )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
})();
</script>
</body>
</html>
